<meta charset="UTF-8">
<script>
    const preco = Number(prompt("Preço do Produto: "))
    const avista = preco * 0.90 // Desconto de 10% é 0.90 e o Acréscimo é 1.10
    const tresVezes = preco/3 
    alert(`O valor à vista é R$: ${avista.toFixed(2)}\nOu 3x de R$: ${tresVezes.toFixed(2)} sem Juros!`)
</script>
