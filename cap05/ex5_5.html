<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo 5.5</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
    <img src="img/calculadora.png" alt="Contas a Pagar" class="alta">
    <h1>Programa Contas do Mês</h1>
    <form>
        <p>Descrição da Conta:
            <input type="text" id="inDescricao" required>
        </p>
        <p>Valor a Pagar R$: 
            <input type="number" min="0" step="0.01" id="inValor" required>
        </p>
        <input type="submit" value="Registrar Conta">
        <input type="button" value="Zerar Contas" id="btnZerar">
    </form>
    <pre id="outResp1"></pre>
    <pre id="outResp2"></pre>
    <script src="js/ex5_5.js"></script>
</body>
</html>
