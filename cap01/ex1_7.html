<meta charset="UTF-8">
<script>
    const jantar = Number(prompt("Valor do Jantar R$: "))  // lê o valor do jantar 
    const garcom = jantar * 0.10 // Calcula variáveis de saída 
    const cache = 10 
    const total = jantar + garcom + 10
    alert(`Taxa Garçom R$: ${garcom.toFixed(2)}\nTaxa Músico R$: ${cache.toFixed(2)}\nTotal R$: ${total.toFixed(2)}`) 
    // toFixed(2), indica que o valor a ser apresentado deve conter 2 casas decimais
</script>
